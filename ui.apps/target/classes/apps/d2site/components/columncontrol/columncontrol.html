<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html">
    <sly data-sly-call="${clientlib.css @ categories='d2site.columncontrol'}"/>
</sly>
<div data-cmp-is="columncontrol"
     data-sly-use.model="com.d2.core.models.ColumnControlModel"
     data-sly-test="${model}"
     class="${model.cssClass}">
    <div class="cmp-columncontrol__column" data-sly-repeat.col="${model.columnNames}">
        <sly data-sly-resource="${col @ resourceType='wcm/foundation/components/responsivegrid'}"/>
    </div>
</div>
